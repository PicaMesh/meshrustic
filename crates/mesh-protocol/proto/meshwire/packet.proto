// Wire-format schema for mesh packet payloads (field numbers for interoperability).
syntax = "proto3";

package meshwire;

import "meshwire/portnums.proto";
import "meshwire/config.proto";

enum Constants {
  ZERO = 0;
  DATA_PAYLOAD_LEN = 233;
}

message SignalNeighbor {
  fixed32 node_id = 1;
  sint32 rssi = 2;
  sint32 snr = 3;
  uint32 position_variance = 4;
  bool signal_routing_active = 5;
  bool hears_us = 6;
}

message User {
  string id = 1;
  string long_name = 2;
  string short_name = 3;
  bytes macaddr = 4 [deprecated = true];
  uint32 hw_model = 5;
  bool is_licensed = 6;
  Config.DeviceConfig.Role role = 7;
  bytes public_key = 8;
  optional bool is_unmessagable = 9;
}

message RouteDiscovery {
  repeated fixed32 route = 1;
  repeated int32 snr_towards = 2;
  repeated fixed32 route_back = 3;
  repeated int32 snr_back = 4;
}

message Routing {
  enum Error {
    NONE = 0;
    NO_ROUTE = 1;
    GOT_NAK = 2;
    TIMEOUT = 3;
    NO_INTERFACE = 4;
    MAX_RETRANSMIT = 5;
    NO_CHANNEL = 6;
    TOO_LARGE = 7;
    NO_RESPONSE = 8;
    DUTY_CYCLE_LIMIT = 9;
    BAD_REQUEST = 32;
    NOT_AUTHORIZED = 33;
    PKI_FAILED = 34;
    PKI_UNKNOWN_PUBKEY = 35;
    ADMIN_BAD_SESSION_KEY = 36;
    ADMIN_PUBLIC_KEY_UNAUTHORIZED = 37;
    RATE_LIMIT_EXCEEDED = 38;
    PKI_SEND_FAIL_PUBLIC_KEY = 39;
  }

  oneof variant {
    RouteDiscovery route_request = 1;
    RouteDiscovery route_reply = 2;
    Error error_reason = 3;
  }
}

message Data {
  PortNum portnum = 1;
  bytes payload = 2;
  bool want_response = 3;
  fixed32 dest = 4;
  fixed32 source = 5;
  fixed32 request_id = 6;
  fixed32 reply_id = 7;
  fixed32 emoji = 8;
  optional uint32 bitfield = 9;
}

message MeshPacket {
  enum Priority {
    UNSET = 0;
    MIN = 1;
    BACKGROUND = 10;
    DEFAULT = 64;
    RELIABLE = 70;
    RESPONSE = 80;
    HIGH = 100;
    ALERT = 110;
    ACK = 120;
    MAX = 127;
  }

  enum Delayed {
    NO_DELAY = 0;
    DELAYED_BROADCAST = 1;
    DELAYED_DIRECT = 2;
  }

  enum TransportMechanism {
    TRANSPORT_INTERNAL = 0;
    TRANSPORT_LORA = 1;
    TRANSPORT_LORA_ALT1 = 2;
    TRANSPORT_LORA_ALT2 = 3;
    TRANSPORT_LORA_ALT3 = 4;
    TRANSPORT_MQTT = 5;
    TRANSPORT_MULTICAST_UDP = 6;
    TRANSPORT_API = 7;
  }

  fixed32 from = 1;
  fixed32 to = 2;
  uint32 channel = 3;

  oneof payload_variant {
    Data decoded = 4;
    bytes encrypted = 5;
  }

  fixed32 id = 6;
  fixed32 rx_time = 7;
  float rx_snr = 8;
  uint32 hop_limit = 9;
  bool want_ack = 10;
  Priority priority = 11;
  int32 rx_rssi = 12;
  Delayed delayed = 13 [deprecated = true];
  bool via_mqtt = 14;
  uint32 hop_start = 15;
  bytes public_key = 16;
  bool pki_encrypted = 17;
  uint32 next_hop = 18;
  uint32 relay_node = 19;
  uint32 tx_after = 20;
  TransportMechanism transport_mechanism = 21;
}

message SignalRoutingInfo {
  // V3 wire format: field 3 is packed_neighbors bytes (see topology.rs).
  // Legacy fields 1–2 and repeated neighbors on 3 are not emitted.
  bytes packed_neighbors = 3;
}
